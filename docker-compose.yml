services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      CONGESTION_DB_USERNAME: ${CONGESTION_DB_USERNAME:-}
      CONGESTION_DB_PASSWORD: ${CONGESTION_DB_PASSWORD:-}
      MAP_DB_USERNAME: ${MAP_DB_USERNAME:-}
      MAP_DB_PASSWORD: ${MAP_DB_PASSWORD:-}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  redis:
    image: redis:7-alpine
    command: >
      sh -c "if [ -n \"$REDIS_PASSWORD\" ]; then
        redis-server --requirepass \"$REDIS_PASSWORD\";
      else
        redis-server;
      fi"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  # ── Observability (Prometheus + Loki + Grafana) ─────────────────────────────

  observability:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTel Collector gRPC
      - "4318:4318"   # OTel Collector HTTP
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:?GF_ADMIN_USER is not set}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:?GF_ADMIN_PASSWORD is not set}
      - GF_SERVER_ROOT_URL=https://grafana.goseoul.today/
    volumes:
      - ./grafana/provisioning/dashboards/dashboard.yml:/otel-lgtm/grafana/conf/provisioning/dashboards/danburn.yaml
      - ./grafana/provisioning/datasources/datasource.yml:/otel-lgtm/grafana/conf/provisioning/datasources/danburn.yaml
      - ./grafana/dashboards:/otel-lgtm/danburn-dashboards
    networks:
      - backend-net

  # ── Application Services ────────────────────────────────────────────────────

  # 혼잡도 분석 서비스 (Redis)
  service-congestion:
    build:
      context: .
      dockerfile: service-congestion/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-local}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/danburn_congestion?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${CONGESTION_DB_USERNAME:-root}
      - SPRING_DATASOURCE_PASSWORD=${CONGESTION_DB_PASSWORD:-root}
      - OTLP_URL=http://observability:4318/v1/metrics
      - OTLP_TRACES_URL=http://observability:4318/v1/traces
      - LOKI_URL=http://observability:3100/loki/api/v1/push
      - CONGESTION_SCHEDULER_INTERVAL=${CONGESTION_SCHEDULER_INTERVAL:-300000}
      - CONGESTION_CLEANUP_CRON=${CONGESTION_CLEANUP_CRON:-0 0 3 * * *}
      - CONGESTION_CLEANUP_RETENTION_DAYS=${CONGESTION_CLEANUP_RETENTION_DAYS:-7}
      - SEOUL_API_KEY=${SEOUL_API_KEY}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USER:-guest}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASS:-guest}
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend-net

  # 지도 & 대체지 추천 서비스 (MySQL)
  service-map:
    build:
      context: .
      dockerfile: service-map/Dockerfile
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/danburn_map?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${MAP_DB_USERNAME:-root}
      - SPRING_DATASOURCE_PASSWORD=${MAP_DB_PASSWORD:-root}
      - OTLP_URL=http://observability:4318/v1/metrics
      - OTLP_TRACES_URL=http://observability:4318/v1/traces
      - LOKI_URL=http://observability:3100/loki/api/v1/push
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend-net

  # 교통 & 이동수단 서비스 (Redis)
  service-mobility:
    build:
      context: .
      dockerfile: service-mobility/Dockerfile
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - OTLP_URL=http://observability:4318/v1/metrics
      - OTLP_TRACES_URL=http://observability:4318/v1/traces
      - LOKI_URL=http://observability:3100/loki/api/v1/push
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend-net

  # AI 분석 서비스 (Python/FastAPI)
  service-ai:
    build:
      context: ./service-ai
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.cerebras.ai/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-qwen-3-235b-a22b-instruct-2507}
      - OTLP_TRACES_URL=http://observability:4318/v1/traces
      - LOKI_URL=http://observability:3100/loki/api/v1/push
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - backend-net

  # API Gateway (진입점)
  service-gateway:
    build:
      context: .
      dockerfile: service-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - CONGESTION_SERVICE_URL=http://service-congestion:8082
      - MAP_SERVICE_URL=http://service-map:8083
      - MOBILITY_SERVICE_URL=http://service-mobility:8084
      - AI_SERVICE_URL=http://service-ai:8085
      - OTLP_URL=http://observability:4318/v1/metrics
      - OTLP_TRACES_URL=http://observability:4318/v1/traces
      - LOKI_URL=http://observability:3100/loki/api/v1/push
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy
      service-congestion:
        condition: service_started
      service-map:
        condition: service_started
      service-mobility:
        condition: service_started
      service-ai:
        condition: service_started
    networks:
      - backend-net

volumes:
  mysql-data:

networks:
  backend-net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450
