services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  # ── Observability (Prometheus + Loki + Grafana) ─────────────────────────────

  observability:
    image: grafana/otel-lgtm:latest
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTel Collector gRPC
      - "4318:4318"   # OTel Collector HTTP
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:?GF_ADMIN_USER is not set}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:?GF_ADMIN_PASSWORD is not set}
      - GF_SERVER_ROOT_URL=https://grafana.goseoul.today/
    volumes:
      - ./grafana/provisioning/dashboards/dashboard.yml:/otel-lgtm/grafana/conf/provisioning/dashboards/danburn.yaml
      - ./grafana/dashboards:/otel-lgtm/danburn-dashboards
    networks:
      - backend-net

  # ── Application Services ────────────────────────────────────────────────────

  # 혼잡도 분석 서비스 (Redis)
  service-congestion:
    build:
      context: .
      dockerfile: service-congestion/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-local}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/danburn_congestion?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - OTLP_URL=http://observability:4318/v1/metrics
      - LOKI_URL=http://observability:3100/loki/api/v1/push
      - CONGESTION_SCHEDULER_INTERVAL=${CONGESTION_SCHEDULER_INTERVAL:-300000}
      - CONGESTION_CLEANUP_CRON=${CONGESTION_CLEANUP_CRON:-0 0 3 * * *}
      - CONGESTION_CLEANUP_RETENTION_DAYS=${CONGESTION_CLEANUP_RETENTION_DAYS:-7}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USER:-guest}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASS:-guest}
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend-net

  # 지도 & 대체지 추천 서비스 (MySQL)
  service-map:
    build:
      context: .
      dockerfile: service-map/Dockerfile
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/danburn_map?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - OTLP_URL=http://observability:4318/v1/metrics
      - LOKI_URL=http://observability:3100/loki/api/v1/push
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend-net

  # 교통 & 버스 서비스 (Redis)
  service-transport:
    build:
      context: .
      dockerfile: service-transport/Dockerfile
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - OTLP_URL=http://observability:4318/v1/metrics
      - LOKI_URL=http://observability:3100/loki/api/v1/push
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend-net

  # AI 분석 서비스 (Python/FastAPI)
  service-ai:
    build:
      context: ./service-ai
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net

  # API Gateway (진입점)
  service-gateway:
    build:
      context: .
      dockerfile: service-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - CONGESTION_SERVICE_URL=http://service-congestion:8082
      - MAP_SERVICE_URL=http://service-map:8083
      - TRANSPORT_SERVICE_URL=http://service-transport:8084
      - AI_SERVICE_URL=http://service-ai:8085
      - OTLP_URL=http://observability:4318/v1/metrics
      - LOKI_URL=http://observability:3100/loki/api/v1/push
    depends_on:
      - service-congestion
      - service-map
      - service-transport
      - service-ai
    networks:
      - backend-net

volumes:
  mysql-data:

networks:
  backend-net:
    driver: bridge
