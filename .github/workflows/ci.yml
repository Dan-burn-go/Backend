name: CI
# 트리거 (언제 실행할지)
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs: # 작업 정의 (어디서 실행할지, 어떤 작업을 할지)

  # ── Java 서비스 빌드 ────────────────────────────────────────────────────────
  build-java:
    runs-on: ubuntu-latest # 실행 환경

    strategy:
      # [핵심] 서비스가 추가되면 여기에 이름만 더 적어야 함
      matrix:
        service: [service-congestion, service-map, service-transport, service-gateway]

    steps:
      - uses: actions/checkout@v4 # 코드 확인

      - name: Set up JDK 21
        uses: actions/setup-java@v4 # JDK 설치
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4 # Gradle 설치 + 캐싱 사용

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Service
        run: ./gradlew :${{ matrix.service }}:build --no-daemon # 빌드 실행

      # 서비스 도커 빌드 검증
      - name: Docker Build Test
        run: docker build -t my-app-${{ matrix.service }}:${{ github.sha }} -f ./${{ matrix.service }}/Dockerfile .

      # 이미지 보안 스캔 (패치 미제공 취약점은 무시)
      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-app-${{ matrix.service }}:${{ github.sha }}'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

  # ── AI 서비스 빌드 (Python) ─────────────────────────────────────────────────
  build-ai:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 도커 빌드 검증
      - name: Docker Build Test
        run: docker build -t my-app-service-ai:${{ github.sha }} ./service-ai

      # 이미지 보안 스캔 (패치 미제공 취약점은 무시)
      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-app-service-ai:${{ github.sha }}'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
