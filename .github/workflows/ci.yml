name: CI
# 트리거 (언제 실행할지)
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs: # 작업 정의 (어디서 실행할지, 어떤 작업을 할지)
  build:
    runs-on: ubuntu-latest # 실행 환경

    steps:
      - uses: actions/checkout@v4 # 코드 확인

      - name: Set up JDK 21
        uses: actions/setup-java@v4 # JDK 설치
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4 # Gradle 설치 + 캐싱 사용

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build
        run: ./gradlew build --no-daemon # 빌드
