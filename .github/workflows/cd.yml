name: CD - Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  # ── Docker 이미지 병렬 빌드 & 푸시 (2개씩, GitHub-hosted) ──────────────────
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        include:
          - service: service-gateway
            context: .
            dockerfile: service-gateway/Dockerfile
          - service: service-map
            context: .
            dockerfile: service-map/Dockerfile
          - service: service-congestion
            context: .
            dockerfile: service-congestion/Dockerfile
          - service: service-mobility
            context: .
            dockerfile: service-mobility/Dockerfile
          - service: service-ai
            context: ./service-ai
            dockerfile: ./service-ai/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/danburn-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/danburn-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ── 서버 배포 (Self-hosted Runner) ─────────────────────────────────────────
  deploy:
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Pull latest code
        run: |
          cd ~/Backend
          git checkout -- .
          git clean -fd
          success=false
          for i in 1 2 3; do
            git pull origin main && success=true && break
            echo "git pull failed (attempt $i/3), retrying in 10s..."
            sleep 10
          done
          if [ "$success" = false ]; then
            echo "::error::git pull failed after 3 attempts"
            exit 1
          fi

      - name: Pull and restart containers
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GF_ADMIN_USER: ${{ secrets.GF_ADMIN_USER }}
          GF_ADMIN_PASSWORD: ${{ secrets.GF_ADMIN_PASSWORD }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          cd ~/Backend
          success=false
          for i in 1 2 3; do
            sudo -E infisical run --env=prod -- \
              docker compose -f docker-compose.yml -f docker-compose.prod.yml pull && success=true && break
            echo "Pull failed (attempt $i/3), retrying in 10s..."
            sleep 10
          done
          if [ "$success" = false ]; then
            echo "::error::docker pull failed after 3 attempts"
            exit 1
          fi
          sudo -E infisical run --env=prod -- \
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

      - name: Ensure MySQL DB users exist
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          cd ~/Backend
          echo "Waiting for MySQL to be healthy..."
          for i in $(seq 1 30); do
            if sudo docker exec backend-mysql-1 mysqladmin ping -uroot -proot --silent 2>/dev/null; then
              echo "MySQL is ready."
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          sudo -E infisical run --env=prod -- bash -c '
            docker exec backend-mysql-1 mysql -uroot -proot -e "
              CREATE USER IF NOT EXISTS \"${CONGESTION_DB_USERNAME}\"@\"%\" IDENTIFIED BY \"${CONGESTION_DB_PASSWORD}\";
              GRANT ALL PRIVILEGES ON danburn_congestion.* TO \"${CONGESTION_DB_USERNAME}\"@\"%\";
              CREATE USER IF NOT EXISTS \"${MAP_DB_USERNAME}\"@\"%\" IDENTIFIED BY \"${MAP_DB_PASSWORD}\";
              GRANT ALL PRIVILEGES ON danburn_map.* TO \"${MAP_DB_USERNAME}\"@\"%\";
              FLUSH PRIVILEGES;
            "
          '
          echo "DB users ensured. Restarting services..."
          sudo docker restart backend-service-congestion-1 backend-service-map-1 || true

      - name: Start Portainer (if not running)
        run: |
          cd ~/Backend
          sudo docker compose -f docker-compose.portainer.yml up -d

      - name: Clean up old images
        run: sudo docker image prune -f
