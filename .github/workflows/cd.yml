name: CD - Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  # ── 변경된 서비스 감지 ─────────────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has_changes: ${{ steps.build-matrix.outputs.has_changes }}
      services: ${{ steps.build-matrix.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            common:
              - 'service-common/**'
            gateway:
              - 'service-gateway/**'
            map:
              - 'service-map/**'
            congestion:
              - 'service-congestion/**'
            mobility:
              - 'service-mobility/**'
            ai:
              - 'service-ai/**'
            infra:
              - 'docker-compose.yml'
              - 'docker-compose.prod.yml'

      - name: Build matrix from changes
        id: build-matrix
        run: |
          MATRIX="[]"

          # service-common 변경 시 Java 서비스 전체 빌드
          COMMON="${{ steps.filter.outputs.common }}"

          add_service() {
            local svc="$1" ctx="$2" dockerfile="$3"
            MATRIX=$(echo "$MATRIX" | jq -c --arg s "$svc" --arg c "$ctx" --arg d "$dockerfile" \
              '. + [{"service": $s, "context": $c, "dockerfile": $d}]')
          }

          if [[ "$COMMON" == "true" || "${{ steps.filter.outputs.gateway }}" == "true" ]]; then
            add_service "service-gateway" "." "service-gateway/Dockerfile"
          fi
          if [[ "$COMMON" == "true" || "${{ steps.filter.outputs.map }}" == "true" ]]; then
            add_service "service-map" "." "service-map/Dockerfile"
          fi
          if [[ "$COMMON" == "true" || "${{ steps.filter.outputs.congestion }}" == "true" ]]; then
            add_service "service-congestion" "." "service-congestion/Dockerfile"
          fi
          if [[ "$COMMON" == "true" || "${{ steps.filter.outputs.mobility }}" == "true" ]]; then
            add_service "service-mobility" "." "service-mobility/Dockerfile"
          fi
          if [[ "${{ steps.filter.outputs.ai }}" == "true" ]]; then
            add_service "service-ai" "./service-ai" "./service-ai/Dockerfile"
          fi

          # infra 파일(docker-compose) 변경 시 전체 빌드
          if [[ "${{ steps.filter.outputs.infra }}" == "true" ]]; then
            MATRIX='[
              {"service":"service-gateway","context":".","dockerfile":"service-gateway/Dockerfile"},
              {"service":"service-map","context":".","dockerfile":"service-map/Dockerfile"},
              {"service":"service-congestion","context":".","dockerfile":"service-congestion/Dockerfile"},
              {"service":"service-mobility","context":".","dockerfile":"service-mobility/Dockerfile"},
              {"service":"service-ai","context":"./service-ai","dockerfile":"./service-ai/Dockerfile"}
            ]'
          fi

          # 중복 제거
          MATRIX=$(echo "$MATRIX" | jq -c 'unique_by(.service)')

          # 변경된 서비스 이름 목록 (deploy에서 사용)
          SERVICES=$(echo "$MATRIX" | jq -r '.[].service' | tr '\n' ' ')

          if [ "$(echo "$MATRIX" | jq 'length')" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"
          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
          echo "🔍 Changed services: $SERVICES"

  # ── 변경된 서비스만 빌드 & 푸시 ────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      max-parallel: 2
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/danburn-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/danburn-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ── 서버 배포 (변경된 컨테이너만 재시작) ───────────────────────────────────
  deploy:
    runs-on: self-hosted
    needs: [ detect-changes, build-and-push ]

    steps:
      - name: Pull latest code
        run: |
          cd ~/Backend
          for i in 1 2 3; do
            git pull origin main && break
            echo "git pull failed (attempt $i/3), retrying in 10s..."
            sleep 10
          done

      - name: Pull changed images and restart
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GF_ADMIN_USER: ${{ secrets.GF_ADMIN_USER }}
          GF_ADMIN_PASSWORD: ${{ secrets.GF_ADMIN_PASSWORD }}
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          CHANGED_SERVICES: ${{ needs.detect-changes.outputs.services }}
        run: |
          cd ~/Backend

          # 변경된 서비스만 pull
          for i in 1 2 3; do
            sudo -E infisical run --env=prod -- \
              docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              pull $CHANGED_SERVICES && break
            echo "Pull failed (attempt $i/3), retrying in 10s..."
            sleep 10
          done

          # 변경된 서비스만 재생성 (--no-deps: 의존 컨테이너 재시작 방지)
          sudo -E infisical run --env=prod -- \
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
            up -d --no-deps $CHANGED_SERVICES

          echo "✅ Restarted: $CHANGED_SERVICES"

      - name: Ensure MySQL DB users exist
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          cd ~/Backend
          echo "Waiting for MySQL to be healthy..."
          for i in $(seq 1 30); do
            if sudo docker exec backend-mysql-1 mysqladmin ping -uroot -proot --silent 2>/dev/null; then
              echo "MySQL is ready."
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          sudo -E infisical run --env=prod -- bash -c '
            docker exec backend-mysql-1 mysql -uroot -proot -e "
              CREATE USER IF NOT EXISTS \"${CONGESTION_DB_USERNAME}\"@\"%\" IDENTIFIED BY \"${CONGESTION_DB_PASSWORD}\";
              GRANT ALL PRIVILEGES ON danburn_congestion.* TO \"${CONGESTION_DB_USERNAME}\"@\"%\";
              CREATE USER IF NOT EXISTS \"${MAP_DB_USERNAME}\"@\"%\" IDENTIFIED BY \"${MAP_DB_PASSWORD}\";
              GRANT ALL PRIVILEGES ON danburn_map.* TO \"${MAP_DB_USERNAME}\"@\"%\";
              FLUSH PRIVILEGES;
            "
          '
          echo "DB users ensured. Restarting services..."
          sudo docker restart backend-service-congestion-1 backend-service-map-1 || true

      - name: Start Portainer (if not running)
        run: |
          cd ~/Backend
          sudo docker compose -f docker-compose.portainer.yml up -d

      - name: Clean up old images
        run: sudo docker image prune -f
