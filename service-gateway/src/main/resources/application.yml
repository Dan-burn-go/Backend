spring:
  application:
    name: service-gateway
  cloud:
    gateway:
      routes:
        - id: core-route
          uri: ${CORE_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/**,/swagger-ui/**,/v3/api-docs/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  otlp:
    metrics:
      export:
        url: ${OTLP_URL:http://localhost:4318/v1/metrics}
        step: 10s

logging:
  loki:
    url: ${LOKI_URL:http://localhost:3100/loki/api/v1/push}
  level:
    com.danburn: DEBUG
