spring:
  application:
    name: service-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
            allowedMethods: GET,POST,PUT,DELETE,OPTIONS
            allowedHeaders: Content-Type,Authorization
            allowCredentials: true
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"
      routes:
        # 혼잡도 분석 서비스
        - id: congestion-route
          uri: ${CONGESTION_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/congestion/**
        # 지도 & 대체지 추천 서비스
        - id: map-route
          uri: ${MAP_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/map/**
        # 교통 & 이동수단 서비스
        - id: mobility-route
          uri: ${MOBILITY_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/mobility/**
        # AI 분석 서비스
        - id: ai-route
          uri: ${AI_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/ai/**
        # Swagger API Docs 라우트
        - id: congestion-api-docs
          uri: ${CONGESTION_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/v3/api-docs/congestion
          filters:
            - RewritePath=/v3/api-docs/congestion, /v3/api-docs
        - id: map-api-docs
          uri: ${MAP_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/v3/api-docs/map
          filters:
            - RewritePath=/v3/api-docs/map, /v3/api-docs
        - id: mobility-api-docs
          uri: ${MOBILITY_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/v3/api-docs/mobility
          filters:
            - RewritePath=/v3/api-docs/mobility, /v3/api-docs

springdoc:
  swagger-ui:
    urls:
      - name: 혼잡도 분석 서비스
        url: /v3/api-docs/congestion
      - name: 지도 & 대체지 추천 서비스
        url: /v3/api-docs/map
      - name: 교통 & 이동수단 서비스
        url: /v3/api-docs/mobility

server:
  port: 8080
  forward-headers-strategy: native

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: ${OTLP_URL:http://localhost:4318/v1/metrics}
        step: 10s
    tracing:
      endpoint: ${OTLP_TRACES_URL:http://localhost:4318/v1/traces}

logging:
  loki:
    url: ${LOKI_URL:http://localhost:3100/loki/api/v1/push}
  level:
    com.danburn: DEBUG
