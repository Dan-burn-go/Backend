spring:
  application:
    name: service-congestion
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/danburn_congestion?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD:}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

server:
  port: 8082
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: ${OTLP_URL:http://localhost:4318/v1/metrics}
        step: 10s
    tracing:
      endpoint: ${OTLP_TRACES_URL:http://localhost:4318/v1/traces}

logging:
  loki:
    url: ${LOKI_URL:http://localhost:3100/loki/api/v1/push}
  level:
    com.danburn: DEBUG

seoul:
  api:
    key: ${SEOUL_API_KEY:}

congestion:
  scheduler:
    interval: ${CONGESTION_SCHEDULER_INTERVAL:300000}
    initial-delay: ${CONGESTION_SCHEDULER_INITIAL_DELAY:10000}
  cleanup:
    cron: ${CONGESTION_CLEANUP_CRON:0 0 3 * * *}
    retention-days: ${CONGESTION_CLEANUP_RETENTION_DAYS:7}
